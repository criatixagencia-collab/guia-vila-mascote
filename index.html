<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia Vila Mascote</title>
  <meta name="description" content="Guia local da Vila Mascote com restaurantes, serviços, saúde, beleza, pets, imóveis, compras e muito mais.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <link rel="icon" href="assets/logo-vila-mascote.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section class="hero">
      <header class="hero-topbar" aria-label="Guia Vila Mascote">
        <a class="brand" href="#" aria-label="Guia Vila Mascote">
          <img src="assets/logo-vila-mascote.png" alt="Vila Mascote" class="brand-mark">
          <span class="brand-copy">
            <strong>Guia Vila Mascote</strong>
            <span>Curadoria local</span>
          </span>
        </a>

        <div class="header-counts" aria-label="Resumo do guia">
          <span id="totalCount">0 locais</span>
          <span id="categoryCount">0 categorias</span>
        </div>
      </header>

      <div class="hero-content">
        <h1>Guia Vila Mascote <em>tudo o que você precisa, aqui no bairro.</em></h1>
        <p class="hero-deck">Restaurantes, serviços, saúde, beleza, pet, compras e muito mais.</p>

        <form class="search-panel" id="searchForm" role="search">
          <div class="field search-field">
            <label for="searchInput">O que você busca?</label>
            <input id="searchInput" type="search" placeholder="Restaurante, clínica, serviço..." autocomplete="off">
          </div>

          <div class="field select-field">
            <label for="categorySelect">Categoria</label>
            <select id="categorySelect" aria-label="Selecionar categoria">
              <option value="">Selecione</option>
            </select>
          </div>

          <button type="submit" aria-label="Buscar">
            <span aria-hidden="true">⌕</span>
            Buscar
          </button>
        </form>
      </div>
    </section>

    <section class="category-section" aria-labelledby="categoryHeading">
      <div class="section-heading">
        <h2 id="categoryHeading">Categorias</h2>
      </div>
      <div class="category-grid" id="categoryGrid"></div>
    </section>

    <section class="results-section" aria-labelledby="resultsHeading">
      <div class="results-topbar">
        <div>
          <p class="eyebrow" id="activeCategoryLabel">Todos os locais</p>
          <h2 id="resultsHeading">Estabelecimentos</h2>
        </div>
        <select id="sortSelect" aria-label="Ordenar estabelecimentos">
          <option value="recentes">Mais recentes</option>
          <option value="citados">Mais citados</option>
          <option value="az">A-Z</option>
        </select>
      </div>

      <nav class="subnav" id="subnav" aria-label="Subcategorias"></nav>

      <div class="results-meta" id="resultsMeta"></div>
      <div class="cards-list" id="cardsList"></div>
    </section>

    <section class="map-section" aria-labelledby="mapHeading">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Mapa real</p>
          <h2 id="mapHeading">No mapa</h2>
        </div>
        <span class="map-count" id="mapCount">0 locais</span>
      </div>
      <div class="map-layout">
        <div class="map-wrap">
          <div id="map" aria-label="Mapa dos estabelecimentos da Vila Mascote"></div>
        </div>
        <div class="map-list" id="mapList" aria-label="Locais no mapa"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <img src="assets/logo-vila-mascote.png" alt="" class="footer-mark" aria-hidden="true">
    <p>Guia Vila Mascote</p>
  </footer>

  <script src="dados.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia Vila Mascote</title>
  <meta name="description" content="Guia local da Vila Mascote com restaurantes, serviços, saúde, beleza, pets, imóveis, compras e muito mais.">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7180BM7P79"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7180BM7P79');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital@1&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <link rel="icon" href="assets/logo-vila-mascote.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section class="hero">
      <header class="hero-topbar" aria-label="Revista Digital Vila Mascote">
        <a class="brand" href="https://instagram.com/vila.mascote" target="_blank" rel="noopener" aria-label="Instagram da Revista Digital Vila Mascote">
          <img src="assets/logo-vila-mascote.png" alt="Vila Mascote" class="brand-mark">
          <span class="brand-copy">
            <strong>Revista Digital Vila Mascote</strong>
            <span>@vila.mascote</span>
          </span>
        </a>

        <div class="weather-widget" id="weatherWidget" aria-label="Previsão do Tempo na Vila Mascote" aria-live="polite">
          <span class="weather-title">Previsão do Tempo na Vila Mascote</span>
          <span class="weather-now">
            <span class="weather-icon" id="weatherIcon" aria-hidden="true"></span>
            <span class="weather-temp" id="weatherTemp"></span>
            <span class="weather-sep" aria-hidden="true"></span>
            <span class="weather-desc" id="weatherDesc">Carregando previsão...</span>
          </span>
        </div>
      </header>

      <div class="hero-content">
        <h1><span>Guia Vila Mascote</span> <em>tudo o que você precisa, aqui no bairro.</em></h1>

        <form class="search-panel" id="searchForm" role="search">
          <div class="field search-field">
            <label for="searchInput">Escreva ou explore as categorias abaixo</label>
            <input id="searchInput" type="search" placeholder="nome do lugar ou palavra-chave" autocomplete="off">
          </div>

          <button type="submit" aria-label="Buscar">
            <span aria-hidden="true">⌕</span>
            Buscar
          </button>
        </form>
      </div>
    </section>

    <section class="category-section" aria-labelledby="categoryHeading">
      <div class="section-heading">
        <h2 id="categoryHeading">Explore as categorias</h2>
      </div>
      <div class="category-grid" id="categoryGrid"></div>
    </section>

    <section class="results-section" aria-labelledby="resultsHeading">
      <div class="results-topbar">
        <div>
          <p class="eyebrow" id="activeCategoryLabel">Todos os locais</p>
          <h2 id="resultsHeading">Estabelecimentos</h2>
        </div>
        <select id="sortSelect" aria-label="Ordenar estabelecimentos">
          <option value="recentes">Mais recentes</option>
          <option value="citados">Mais citados</option>
          <option value="az">A-Z</option>
        </select>
      </div>

      <nav class="subnav" id="subnav" aria-label="Subcategorias"></nav>

      <div class="results-meta" id="resultsMeta"></div>
      <div class="cards-list" id="cardsList"></div>
    </section>

    <section class="map-section" aria-labelledby="mapHeading">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Mapa real</p>
          <h2 id="mapHeading">No mapa</h2>
        </div>
        <span class="map-count" id="mapCount">0 locais</span>
      </div>
      <div class="map-layout">
        <div class="map-wrap">
          <div id="map" aria-label="Mapa dos estabelecimentos da Vila Mascote"></div>
        </div>
        <div class="map-list" id="mapList" aria-label="Locais no mapa"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <img src="assets/logo-vila-mascote.png" alt="" class="footer-mark" aria-hidden="true">
    <p>Guia Vila Mascote</p>
  </footer>

  <script src="dados.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
